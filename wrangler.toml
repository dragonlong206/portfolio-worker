name = "portfolio-manager"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Cron trigger: chạy mỗi giờ (phút 0 của mỗi giờ)
[triggers]
crons = ["0 * * * *"]

# Biến môi trường KHÔNG nhạy cảm (có thể để ở đây)
# Biến nhạy cảm (API keys) → cài qua Cloudflare Dashboard hoặc `wrangler secret put`
[vars]
ENVIRONMENT = "production"

# ── Hướng dẫn cài Secret Variables ──────────────────────────
#
# Chạy các lệnh sau trong terminal (chỉ làm 1 lần):
#
#   wrangler secret put SPREADSHEET_ID
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT_KEY
#   wrangler secret put COINGECKO_API_KEY
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put SYNC_SECRET
#
# HOẶC: vào Cloudflare Dashboard → Workers & Pages
#   → Chọn worker → Settings → Variables → Add variable
#
# Xem README.md để biết cách lấy từng giá trị.
